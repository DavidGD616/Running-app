<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RunFlow – Settings</title>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 40px 20px;
      font-family: 'Inter', sans-serif;
    }

    .frame {
      width: 393px;
      height: 1060px;
      background: #121212;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    /* ── Content ── */
    .content {
      position: absolute;
      top: 0; left: 0;
      width: 393px;
      height: calc(1060px - 93px);
      padding: 56px 20px 0;
      display: flex;
      flex-direction: column;
      gap: 32px;
      overflow: hidden;
    }

    /* ── Page title ── */
    .page-title {
      font-size: 28px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.3px;
      line-height: 36px;
      flex-shrink: 0;
    }

    /* ── Profile card ── */
    .profile-card {
      background: #1e1e1e;
      border: 1px solid #3a3a3a;
      border-radius: 16px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
      overflow: hidden;
      position: relative;
    }

    .profile-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px; height: 100%;
      background: #00e676;
      border-radius: 3px 0 0 3px;
    }

    .avatar {
      width: 64px; height: 64px;
      background: rgba(0, 230, 118, 0.08);
      border: 1px solid rgba(0, 230, 118, 0.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .profile-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .profile-name {
      font-size: 18px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.5px;
    }

    .profile-plan {
      display: inline-flex;
      align-items: center;
      padding: 2px 10px;
      background: rgba(0, 230, 118, 0.12);
      border: 1px solid rgba(0, 230, 118, 0.25);
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      color: #00e676;
      letter-spacing: 0.3px;
      align-self: flex-start;
    }

    .profile-week {
      font-size: 13px;
      font-weight: 400;
      color: #666666;
    }

    /* ── Sections ── */
    .section {
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex-shrink: 0;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: #666666;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      padding-left: 4px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-label-line {
      flex: 1;
      height: 1px;
      background: #2a2a2a;
    }

    /* ── Settings card ── */
    .settings-card {
      background: #1e1e1e;
      border: 1px solid #3a3a3a;
      border-radius: 16px;
      overflow: hidden;
    }

    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      height: 56px;
      border-bottom: 1px solid rgba(58, 58, 58, 0.5);
    }

    .settings-row:last-child {
      border-bottom: none;
    }

    .row-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .row-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .row-icon svg {
      width: 18px; height: 18px;
    }

    .icon-green  { background: rgba(0, 230, 118, 0.08); }
    .icon-neutral { background: rgba(179, 179, 179, 0.08); }

    .row-label {
      font-size: 15px;
      font-weight: 500;
      color: #ffffff;
    }

    .row-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .row-value {
      font-size: 14px;
      font-weight: 500;
      color: #666666;
    }

    .connected-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      background: rgba(0, 230, 118, 0.12);
      border: 1px solid rgba(0, 230, 118, 0.25);
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      color: #00e676;
    }

    .chevron {
      width: 16px; height: 16px;
      flex-shrink: 0;
      opacity: 0.4;
    }

    /* ── Log out section ── */
    .logout-section {
      display: flex;
      flex-direction: column;
      gap: 24px;
      flex-shrink: 0;
      padding-top: 8px;
    }

    .logout-card {
      background: rgba(239, 83, 80, 0.06);
      border: 1px solid rgba(239, 83, 80, 0.25);
      border-radius: 16px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
      gap: 10px;
      cursor: pointer;
    }

    .logout-label {
      font-size: 15px;
      font-weight: 600;
      color: #ef5350;
    }

    .version-text {
      font-size: 12px;
      color: #666666;
      text-align: center;
    }

    /* ── Bottom Nav ── */
    .bottom-nav {
      position: absolute;
      bottom: 0; left: 0;
      width: 393px;
      height: 93px;
      background: rgba(30, 30, 30, 0.95);
      border-top: 1px solid #3a3a3a;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 13px 32px 0;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      width: 64px;
      cursor: pointer;
    }

    .nav-icon {
      width: 24px; height: 24px;
    }

    .nav-label {
      font-size: 11px;
      font-weight: 500;
      color: #666666;
      letter-spacing: 0.16px;
    }

    .nav-label.active {
      font-weight: 600;
      color: #00e676;
    }
  </style>
</head>
<body>
<div class="frame">

  <!-- Content -->
  <div class="content">

    <!-- Title -->
    <h1 class="page-title">Settings</h1>

    <!-- Profile Card -->
    <div class="profile-card">
      <div class="avatar">
        <svg viewBox="0 0 32 32" width="32" height="32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M25.3333 28V25.3333C25.3333 23.9188 24.7714 22.5623 23.7712 21.5621C22.771 20.5619 21.4145 20 20 20H12C10.5855 20 9.22896 20.5619 8.22876 21.5621C7.22857 22.5623 6.66667 23.9188 6.66667 25.3333V28" stroke="#808080" stroke-width="2.66667" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M16 14.6667C18.9455 14.6667 21.3333 12.2789 21.3333 9.33333C21.3333 6.38781 18.9455 4 16 4C13.0545 4 10.6667 6.38781 10.6667 9.33333C10.6667 12.2789 13.0545 14.6667 16 14.6667Z" stroke="#808080" stroke-width="2.66667" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="profile-info">
        <div class="profile-name">User Name</div>
        <div class="profile-plan">Half Marathon Plan</div>
        <div class="profile-week">Week 4 of 12</div>
      </div>

    </div>

    <!-- Plan & Goals -->
    <div class="section">
      <div class="section-label">Plan &amp; Goals<div class="section-label-line"></div></div>
      <div class="settings-card">
        <div class="settings-row">
          <div class="row-left">
            <div class="row-icon icon-green">
              <svg width="20" height="20" viewBox="0 0 20 20" overflow="visible" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M10 18.3333C14.6024 18.3333 18.3333 14.6024 18.3333 10C18.3333 5.39763 14.6024 1.66667 10 1.66667C5.39763 1.66667 1.66667 5.39763 1.66667 10C1.66667 14.6024 5.39763 18.3333 10 18.3333Z" stroke="#00E676" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M10 15C12.7614 15 15 12.7614 15 10C15 7.23858 12.7614 5 10 5C7.23858 5 5 7.23858 5 10C5 12.7614 7.23858 15 10 15Z" stroke="#00E676" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M10 11.6667C10.9205 11.6667 11.6667 10.9205 11.6667 10C11.6667 9.07953 10.9205 8.33333 10 8.33333C9.07953 8.33333 8.33333 9.07953 8.33333 10C8.33333 10.9205 9.07953 11.6667 10 11.6667Z" stroke="#00E676" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <span class="row-label">Update Plan Info</span>
          </div>
          <div class="row-right">
            <svg class="chevron" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M7.5 15L12.5 10L7.5 5" stroke="#666666" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
      </div>
    </div>

    <!-- Preferences -->
    <div class="section">
      <div class="section-label">Preferences<div class="section-label-line"></div></div>
      <div class="settings-card">

        <!-- Language -->
        <div class="settings-row">
          <div class="row-left">
            <div class="row-icon icon-neutral">
              <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M10 18.3333C14.6024 18.3333 18.3333 14.6024 18.3333 10C18.3333 5.39763 14.6024 1.66667 10 1.66667C5.39763 1.66667 1.66667 5.39763 1.66667 10C1.66667 14.6024 5.39763 18.3333 10 18.3333Z" stroke="#B3B3B3" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M10 1.66667C7.8602 3.91346 6.66667 6.89728 6.66667 10C6.66667 13.1027 7.8602 16.0865 10 18.3333C12.1398 16.0865 13.3333 13.1027 13.3333 10C13.3333 6.89728 12.1398 3.91346 10 1.66667Z" stroke="#B3B3B3" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M1.66667 10H18.3333" stroke="#B3B3B3" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <span class="row-label">Language</span>
          </div>
          <div class="row-right">
            <span class="row-value">English</span>
            <svg class="chevron" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M7.5 15L12.5 10L7.5 5" stroke="#666666" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>

        <!-- Units -->
        <div class="settings-row">
          <div class="row-left">
            <div class="row-icon icon-neutral">
              <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M17.75 12.75C17.9365 12.9358 18.0844 13.1566 18.1853 13.3997C18.2863 13.6428 18.3382 13.9034 18.3382 14.1667C18.3382 14.4299 18.2863 14.6905 18.1853 14.9336C18.0844 15.1767 17.9365 15.3975 17.75 15.5833L15.5833 17.75C15.3975 17.9365 15.1767 18.0844 14.9336 18.1853C14.6905 18.2863 14.4299 18.3382 14.1667 18.3382C13.9034 18.3382 13.6428 18.2863 13.3997 18.1853C13.1566 18.0844 12.9358 17.9365 12.75 17.75L2.25 7.25C1.87546 6.87365 1.6652 6.36429 1.6652 5.83333C1.6652 5.30237 1.87546 4.79302 2.25 4.41667L4.41667 2.25C4.79302 1.87546 5.30237 1.6652 5.83333 1.6652C6.36429 1.6652 6.87365 1.87546 7.25 2.25L17.75 12.75Z" stroke="#B3B3B3" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M12.0833 10.4167L13.75 8.75" stroke="#B3B3B3" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M9.58333 7.91667L11.25 6.25" stroke="#B3B3B3" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <span class="row-label">Units</span>
          </div>
          <div class="row-right">
            <span class="row-value">Metric (km)</span>
            <svg class="chevron" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M7.5 15L12.5 10L7.5 5" stroke="#666666" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>

        <!-- Audio Guidance -->
        <div class="settings-row">
          <div class="row-left">
            <div class="row-icon icon-neutral">
              <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M9.16667 3.91833C9.1665 3.80226 9.13195 3.68884 9.06739 3.59238C9.00282 3.49592 8.91113 3.42075 8.80388 3.37636C8.69663 3.33196 8.57864 3.32033 8.46478 3.34293C8.35093 3.36552 8.24633 3.42134 8.16417 3.50333L5.34417 6.3225C5.23534 6.43198 5.10586 6.51878 4.96324 6.57785C4.82063 6.63693 4.6677 6.66712 4.51333 6.66667H2.5C2.27899 6.66667 2.06702 6.75446 1.91074 6.91074C1.75446 7.06703 1.66667 7.27899 1.66667 7.5V12.5C1.66667 12.721 1.75446 12.933 1.91074 13.0893C2.06702 13.2455 2.27899 13.3333 2.5 13.3333H4.51333C4.6677 13.3329 4.82063 13.3631 4.96324 13.4221C5.10586 13.4812 5.23534 13.568 5.34417 13.6775L8.16333 16.4975C8.2455 16.5798 8.35026 16.6359 8.46433 16.6587C8.5784 16.6814 8.69665 16.6698 8.8041 16.6252C8.91156 16.5807 9.00337 16.5053 9.06792 16.4085C9.13246 16.3117 9.16683 16.198 9.16667 16.0817V3.91833Z" stroke="#B3B3B3" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M13.3333 7.5C13.8743 8.22123 14.1667 9.09846 14.1667 10C14.1667 10.9015 13.8743 11.7788 13.3333 12.5" stroke="#B3B3B3" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M16.1367 15.3033C16.8331 14.6069 17.3856 13.7801 17.7625 12.8701C18.1394 11.9602 18.3334 10.9849 18.3334 10C18.3334 9.01508 18.1394 8.0398 17.7625 7.12985C17.3856 6.2199 16.8331 5.39311 16.1367 4.69667" stroke="#B3B3B3" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <span class="row-label">Audio Guidance</span>
          </div>
          <div class="row-right">
            <span class="row-value">Minimal</span>
            <svg class="chevron" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M7.5 15L12.5 10L7.5 5" stroke="#666666" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>

        <!-- Notifications -->
        <div class="settings-row">
          <div class="row-left">
            <div class="row-icon icon-neutral">
              <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M8.55667 17.5C8.70295 17.7533 8.91335 17.9637 9.1667 18.11C9.42006 18.2563 9.70745 18.3333 10 18.3333C10.2925 18.3333 10.5799 18.2563 10.8333 18.11C11.0867 17.9637 11.297 17.7533 11.4433 17.5" stroke="#B3B3B3" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M2.71833 12.7717C2.60947 12.891 2.53763 13.0394 2.51155 13.1988C2.48546 13.3582 2.50627 13.5217 2.57142 13.6695C2.63658 13.8173 2.74328 13.943 2.87855 14.0312C3.01381 14.1195 3.17182 14.1665 3.33333 14.1667H16.6667C16.8282 14.1667 16.9862 14.1199 17.1216 14.0318C17.2569 13.9437 17.3637 13.8181 17.4291 13.6704C17.4944 13.5227 17.5154 13.3592 17.4895 13.1998C17.4637 13.0404 17.392 12.892 17.2833 12.7725C16.175 11.63 15 10.4158 15 6.66667C15 5.34058 14.4732 4.06881 13.5355 3.13113C12.5979 2.19345 11.3261 1.66667 10 1.66667C8.67392 1.66667 7.40215 2.19345 6.46447 3.13113C5.52678 4.06881 5 5.34058 5 6.66667C5 10.4158 3.82417 11.63 2.71833 12.7717Z" stroke="#B3B3B3" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <span class="row-label">Notifications</span>
          </div>
          <div class="row-right">
            <span class="row-value">Enabled</span>
            <svg class="chevron" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M7.5 15L12.5 10L7.5 5" stroke="#666666" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>

      </div>
    </div>

    <!-- Connected Devices -->
    <div class="section">
      <div class="section-label">Connected Devices<div class="section-label-line"></div></div>
      <div class="settings-card">
        <div class="settings-row">
          <div class="row-left">
            <div class="row-icon icon-neutral">
              <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M10 15C12.7614 15 15 12.7614 15 10C15 7.23858 12.7614 5 10 5C7.23858 5 5 7.23858 5 10C5 12.7614 7.23858 15 10 15Z" stroke="#B3B3B3" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M10 8.33333V10L10.8333 10.8333" stroke="#B3B3B3" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M13.4417 6.38333L12.7667 3.00833C12.6905 2.62467 12.4817 2.28003 12.177 2.03475C11.8723 1.78947 11.4911 1.65917 11.1 1.66667H8.86667C8.47558 1.65917 8.09432 1.78947 7.78962 2.03475C7.48492 2.28003 7.2762 2.62467 7.2 3.00833L6.55 6.38333" stroke="#B3B3B3" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <span class="row-label">Garmin Connect</span>
          </div>
          <div class="row-right">
            <span class="connected-badge">
              <svg viewBox="0 0 16 16" width="13" height="13" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M8 14.6667C11.6819 14.6667 14.6667 11.6819 14.6667 8C14.6667 4.3181 11.6819 1.33333 8 1.33333C4.3181 1.33333 1.33333 4.3181 1.33333 8C1.33333 11.6819 4.3181 14.6667 8 14.6667Z" stroke="#00E676" stroke-width="1.33333" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M6 8L7.33333 9.33333L10 6.66667" stroke="#00E676" stroke-width="1.33333" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              Connected
            </span>
            <svg class="chevron" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M7.5 15L12.5 10L7.5 5" stroke="#666666" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
      </div>
    </div>

    <!-- Log Out + Version -->
    <div class="logout-section">
      <div class="logout-card">
        <div class="row-icon" style="background: rgba(239,83,80,0.08); width:28px; height:28px; border-radius:8px;">
          <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M7.5 17.5H4.16667C3.72464 17.5 3.30072 17.3244 2.98816 17.0118C2.67559 16.6993 2.5 16.2754 2.5 15.8333V4.16667C2.5 3.72464 2.67559 3.30072 2.98816 2.98816C3.30072 2.67559 3.72464 2.5 4.16667 2.5H7.5" stroke="#EF5350" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M13.3333 14.1667L17.5 10L13.3333 5.83333" stroke="#EF5350" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M17.5 10H7.5" stroke="#EF5350" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="logout-label">Log Out</span>
      </div>
      <div class="version-text">RunFlow v1.0.0 (Build 42)</div>
    </div>

  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
