<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RunFlow – Weekly Plan</title>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 40px 20px;
      font-family: 'Inter', sans-serif;
    }

    .frame {
      width: 393px;
      height: 1105px;
      background: #121212;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    /* ── Header ── */
    .header {
      position: absolute;
      top: 0; left: 0;
      width: 393px;
      height: 120px;
      background: #121212;
      display: flex;
      align-items: center;
      padding: 0 8px;
      z-index: 10;
    }

    .back-btn {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      cursor: pointer;
    }
    .back-btn svg { width: 28px; height: 28px; display: block; }

    .header-title {
      font-size: 18px;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: -0.5px;
      white-space: nowrap;
      margin-left: 6px;
    }

    /* ── Content ── */
    .content {
      position: absolute;
      top: 120px; left: 0;
      width: 393px;
      height: calc(1105px - 120px - 96px);
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow: hidden;
    }

    /* ── Stats bar — compact dashboard module ── */
    .stats-bar {
      display: flex;
      align-items: stretch;
      height: 68px;
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .stat-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
    }

    .stat-col + .stat-col {
      border-left: 1px solid #2a2a2a;
    }

    .stat-col-label {
      font-size: 10px;
      font-weight: 600;
      color: #666666;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    .stat-col-value {
      font-size: 17px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.4px;
      font-variant-numeric: tabular-nums;
    }

    /* ── Section label ── */
    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #666666;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      margin-bottom: -8px;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #2a2a2a;
    }

    /* ── Days list ── */
    .days-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex-shrink: 0;
    }

    /* ── Day card — flex layout ── */
    .day-card {
      width: 353px;
      height: 72px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 14px;
      flex-shrink: 0;
      position: relative;
    }

    .day-card.rest {
      background: transparent;
      border: 1px solid #222222;
    }

    .day-card.active {
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
    }

    .day-card.today {
      background: rgba(0, 230, 118, 0.06);
      border: 1px solid #00e676;
    }

    /* left accent for today */
    .day-card.today::before {
      content: '';
      position: absolute;
      left: 0; top: 12px; bottom: 12px;
      width: 3px;
      background: #00e676;
      border-radius: 0 3px 3px 0;
    }

    /* ── Date badge ── */
    .date-badge {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: #252525;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1px;
      flex-shrink: 0;
    }

    .day-card.rest .date-badge {
      background: #1c1c1c;
    }

    .date-day {
      font-size: 10px;
      font-weight: 600;
      color: #666666;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      line-height: 1;
    }

    .date-num {
      font-size: 18px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.4px;
      line-height: 1.1;
    }

    .day-card.rest .date-day  { color: #444444; }
    .day-card.rest .date-num  { color: #666666; }

    .day-card.today .date-day { color: #00e676; }
    .day-card.today .date-num { color: #00e676; }

    /* ── Activity body ── */
    .activity-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .activity-title-row {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .activity-title {
      font-size: 14px;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: -0.2px;
      white-space: nowrap;
    }

    .day-card.rest .activity-title { color: #555555; }
    .day-card.today .activity-title { color: #00e676; }

    .run-badge {
      display: inline-flex;
      align-items: center;
      padding: 1px 7px;
      border-radius: 999px;
      background: rgba(0, 230, 118, 0.12);
      border: 1px solid rgba(0, 230, 118, 0.2);
      font-size: 10px;
      font-weight: 600;
      color: #00e676;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }

    .activity-sub {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .activity-sub-text {
      font-size: 12px;
      font-weight: 400;
      color: #444444;
      white-space: nowrap;
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .meta-item svg {
      width: 12px;
      height: 12px;
      display: block;
      flex-shrink: 0;
      opacity: 0.5;
    }

    .day-card.today .meta-item svg { opacity: 0.7; }

    .meta-value {
      font-size: 12px;
      font-weight: 500;
      color: #666666;
      white-space: nowrap;
      letter-spacing: 0.1px;
    }

    /* ── Action icon ── */
    .action-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: #222222;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      cursor: pointer;
    }
    .action-btn svg { width: 18px; height: 18px; display: block; }

    .day-card.rest .action-btn {
      background: transparent;
      opacity: 0.4;
    }

    .day-card.today .action-btn {
      background: rgba(0, 230, 118, 0.15);
      border: 1px solid rgba(0, 230, 118, 0.25);
    }

    /* ── Bottom CTA (untouched) ── */
    .bottom-cta {
      position: absolute;
      bottom: 0; left: 0;
      width: 393px;
      height: 96px;
      padding: 20px 20px 0 20px;
      background: linear-gradient(
        0deg,
        rgb(18,18,18) 0%,
        rgb(18,18,18) 50%,
        rgba(10,10,10,0.8) 60%,
        rgba(4,4,4,0.6) 70%,
        rgba(1,1,1,0.4) 80%,
        rgba(0,0,0,0.2) 90%,
        rgba(0,0,0,0) 100%
      );
    }

    .cta-btn {
      width: 100%;
      height: 56px;
      background: #00e676;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0px 4px 20px 0px rgba(0,230,118,0.2);
    }

    .cta-btn span {
      font-size: 16px;
      font-weight: 600;
      color: #121212;
      letter-spacing: -0.2125px;
      white-space: nowrap;
    }
  </style>
</head>
