<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none">
  <!-- Abstract running figure mark -->
  <g transform="translate(4, 8)">
    <!-- Motion trail lines -->
    <line x1="0" y1="16" x2="12" y2="16" stroke="#4ade80" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    <line x1="2" y1="20" x2="10" y2="20" stroke="#4ade80" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
    <!-- Body -->
    <circle cx="20" cy="8" r="4" fill="#4ade80"/>
    <!-- Torso -->
    <line x1="20" y1="12" x2="18" y2="24" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Forward leg -->
    <line x1="18" y1="24" x2="28" y2="32" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Back leg -->
    <line x1="18" y1="24" x2="10" y2="32" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Forward arm -->
    <line x1="20" y1="16" x2="28" y2="20" stroke="#4ade80" stroke-width="2" stroke-linecap="round"/>
    <!-- Back arm -->
    <line x1="20" y1="16" x2="12" y2="22" stroke="#4ade80" stroke-width="2" stroke-linecap="round"/>
    <!-- Glow accent -->
    <circle cx="20" cy="8" r="6" fill="#4ade80" opacity="0.15"/>
  </g>
  <!-- Wordmark -->
  <text x="44" y="32" font-family="Clash Display, sans-serif" font-weight="600" font-size="22" fill="#4ade80">StrivIQ</text>
</svg>
