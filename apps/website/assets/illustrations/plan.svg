<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Calendar grid background -->
  <rect x="30" y="30" width="140" height="140" rx="8" stroke="#333" stroke-width="1.5"/>
  <!-- Header bar -->
  <line x1="30" y1="55" x2="170" y2="55" stroke="#333" stroke-width="1.5"/>
  <!-- Header dots -->
  <circle cx="45" cy="42" r="3" fill="#4ade80" filter="url(#glow)"/>
  <circle cx="58" cy="42" r="3" fill="#4ade80" opacity="0.5"/>
  <circle cx="71" cy="42" r="3" fill="#4ade80" opacity="0.3"/>
  <!-- Grid rows -->
  <line x1="30" y1="80" x2="170" y2="80" stroke="#222" stroke-width="1"/>
  <line x1="30" y1="105" x2="170" y2="105" stroke="#222" stroke-width="1"/>
  <line x1="30" y1="130" x2="170" y2="130" stroke="#222" stroke-width="1"/>
  <line x1="30" y1="155" x2="170" y2="155" stroke="#222" stroke-width="1"/>
  <!-- Grid columns -->
  <line x1="60" y1="55" x2="60" y2="170" stroke="#222" stroke-width="1"/>
  <line x1="90" y1="55" x2="90" y2="170" stroke="#222" stroke-width="1"/>
  <line x1="120" y1="55" x2="120" y2="170" stroke="#222" stroke-width="1"/>
  <line x1="150" y1="55" x2="150" y2="170" stroke="#222" stroke-width="1"/>
  <!-- Workout day highlights -->
  <rect x="33" y="58" width="24" height="19" rx="3" fill="#4ade80" opacity="0.2"/>
  <rect x="63" y="58" width="24" height="19" rx="3" fill="#4ade80" opacity="0.2"/>
  <rect x="123" y="58" width="24" height="19" rx="3" fill="#4ade80" opacity="0.2"/>
  <rect x="33" y="83" width="24" height="19" rx="3" fill="#4ade80" opacity="0.2"/>
  <rect x="93" y="83" width="24" height="19" rx="3" fill="#4ade80" opacity="0.2"/>
  <rect x="153" y="83" width="14" height="19" rx="3" fill="#4ade80" opacity="0.2"/>
  <rect x="63" y="108" width="24" height="19" rx="3" fill="#4ade80" opacity="0.2"/>
  <rect x="123" y="108" width="24" height="19" rx="3" fill="#4ade80" opacity="0.2"/>
  <rect x="33" y="133" width="24" height="19" rx="3" fill="#4ade80" opacity="0.2"/>
  <rect x="93" y="133" width="24" height="19" rx="3" fill="#4ade80" opacity="0.2"/>
  <!-- Checkmarks on completed days -->
  <path d="M39 68 L43 72 L51 62" stroke="#4ade80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <path d="M69 68 L73 72 L81 62" stroke="#4ade80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <path d="M39 93 L43 97 L51 87" stroke="#4ade80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <path d="M99 93 L103 97 L111 87" stroke="#4ade80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Connecting progress line -->
  <path d="M45 68 L75 68 L105 93 L45 93" stroke="#4ade80" stroke-width="1" stroke-dasharray="3 3" opacity="0.4"/>
</svg>
