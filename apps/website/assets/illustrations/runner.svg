<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Head -->
  <circle cx="100" cy="40" r="10" fill="#4ade80" filter="url(#glow)"/>
  <!-- Torso -->
  <line x1="100" y1="50" x2="95" y2="100" stroke="#4ade80" stroke-width="3" stroke-linecap="round"/>
  <!-- Forward leg (extended) -->
  <line x1="95" y1="100" x2="120" y2="140" stroke="#4ade80" stroke-width="3" stroke-linecap="round"/>
  <line x1="120" y1="140" x2="130" y2="170" stroke="#4ade80" stroke-width="3" stroke-linecap="round"/>
  <!-- Back leg (pushing) -->
  <line x1="95" y1="100" x2="70" y2="130" stroke="#4ade80" stroke-width="3" stroke-linecap="round"/>
  <line x1="70" y1="130" x2="55" y2="160" stroke="#4ade80" stroke-width="3" stroke-linecap="round"/>
  <!-- Forward arm -->
  <line x1="98" y1="65" x2="125" y2="80" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Back arm -->
  <line x1="98" y1="65" x2="72" y2="85" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Motion lines -->
  <line x1="30" y1="60" x2="50" y2="60" stroke="#4ade80" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="25" y1="80" x2="45" y2="80" stroke="#4ade80" stroke-width="1" stroke-linecap="round" opacity="0.2"/>
  <line x1="35" y1="100" x2="50" y2="100" stroke="#4ade80" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  <!-- Ground line -->
  <line x1="40" y1="175" x2="160" y2="175" stroke="#4ade80" stroke-width="1" stroke-linecap="round" opacity="0.15"/>
</svg>
