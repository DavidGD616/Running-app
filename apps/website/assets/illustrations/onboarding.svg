<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Connecting line -->
  <line x1="40" y1="100" x2="160" y2="100" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  <!-- Progress line (active) -->
  <line x1="40" y1="100" x2="100" y2="100" stroke="#4ade80" stroke-width="2" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Step 1 - Completed -->
  <circle cx="40" cy="100" r="16" fill="#4ade80" filter="url(#glow)"/>
  <path d="M33 100 L38 105 L48 94" stroke="#0a0a0a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Step 2 - Active -->
  <circle cx="100" cy="100" r="16" fill="none" stroke="#4ade80" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="100" cy="100" r="6" fill="#4ade80" opacity="0.6"/>
  <!-- Step 3 - Upcoming -->
  <circle cx="160" cy="100" r="16" fill="none" stroke="#333" stroke-width="2"/>
  <circle cx="160" cy="100" r="4" fill="#333"/>
  <!-- Labels -->
  <text x="40" y="140" text-anchor="middle" font-family="Outfit, sans-serif" font-size="9" fill="#4ade80" font-weight="500">Goal</text>
  <text x="100" y="140" text-anchor="middle" font-family="Outfit, sans-serif" font-size="9" fill="#4ade80" font-weight="500">Profile</text>
  <text x="160" y="140" text-anchor="middle" font-family="Outfit, sans-serif" font-size="9" fill="#666" font-weight="500">Plan</text>
  <!-- Decorative elements -->
  <circle cx="40" cy="100" r="22" fill="#4ade80" opacity="0.08"/>
  <circle cx="100" cy="100" r="22" fill="#4ade80" opacity="0.08"/>
</svg>
